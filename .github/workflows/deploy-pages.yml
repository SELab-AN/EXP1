name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: student-task-planner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: student-task-planner/package-lock.json

      - name: Show Node/npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        timeout-minutes: 3
        run: |
          timeout 3m npm ci --include=dev --no-audit --no-fund --progress=false --prefer-offline \
          || (echo "npm ci failed or timed out; falling back to npm install" && timeout 3m npm install --include=dev --no-audit --no-fund --progress=false --prefer-offline)

      - name: Build project
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: student-task-planner/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4